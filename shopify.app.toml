# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "56a812a0244d8c7d95177d83c68451d3"
name = "cloverkit-crossword"
application_url = "https://app.cloverkitstudio.com/app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "https://app.cloverkitstudio.com/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://app.cloverkitstudio.com/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "https://app.cloverkitstudio.com/webhooks/app/subscriptions_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_themes"

[auth]
redirect_urls = [ "https://app.cloverkitstudio.com/api/auth" ]
